name: Build Artifact

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang lld xxd unzip wget python3 pkg-config curl

      - name: Install PS5 Payload SDK + pacbrew libs
        run: |
          curl -fsSL https://github.com/ps5-payload-dev/pacbrew-repo/releases/latest/download/ps5-payload-dev.tar.gz -o /tmp/sdk.tar.gz
          sudo tar -xzf /tmp/sdk.tar.gz -C /
          ls /opt/ps5-payload-sdk/bin | head

      - name: Build
        run: |
          make PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonicloader
          path: sonic-loader.elf
